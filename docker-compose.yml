services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    extra_hosts:
      - "backend:host-gateway"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    network_mode: host
    pid: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # ContainerLab needs host netns access to create veth pairs
      - /run/netns:/run/netns:shared
      - /proc:/host/proc:ro
      # Persistent data
      - ae3gis-db:/app/data
      - ae3gis-clab:/app/clab-workdir
      # Live-reload: mount backend source so uvicorn --reload picks up changes
      - ./backend:/app
      # Scripts: mounted at the same absolute path inside the container as on the host
      # so ContainerLab (inside container) validates the path, and Docker (host daemon)
      # can bind-mount it into clab containers
      - ./backend/scripts:${PWD}/backend/scripts:ro
    environment:
      #- AE3GIS_INSTRUCTOR_TOKEN=${AE3GIS_INSTRUCTOR_TOKEN:-changeme}
      - AE3GIS_DB_PATH=/app/data/ae3gis.db
      - AE3GIS_HOST_SCRIPTS_DIR=${PWD}/backend/scripts
      #- AE3GIS_LLM_API_KEY=sk-feb3ae39a3454903be8febd22a124dbb
      #- AE3GIS_LLM_BASE_URL=https://api.deepseek.com/v1
      #- AE3GIS_LLM_MODEL=deepseek-chat
      - AE3GIS_LLM_BASE_URL=${AE3GIS_LLM_BASE_URL:-http://localhost:11434/v1}
      - AE3GIS_LLM_API_KEY=${AE3GIS_LLM_API_KEY:-ollama}
      - AE3GIS_LLM_MODEL=${AE3GIS_LLM_MODEL:-qwen2.5:7b}
    restart: unless-stopped
    privileged: true

volumes:
  ae3gis-db:
  ae3gis-clab:
